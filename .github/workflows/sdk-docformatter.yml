name: KFP SDK Docformatter Test

on:
  push:
    branches:
      - master
      - main
      - stable
      - 'rhoai-*'

  pull_request:
    paths:
      - 'sdk/python/**'
      - 'test/presubmit-docformatter-sdk.sh'
      - '.github/workflows/sdk-docformatter.yml'
      - '!**/*.md'
      - '!**/OWNERS'

jobs:
  gatekeeper:
    uses: ./.github/workflows/wait-for-gatekeeper.yml

  test-docformatter-kfp-sdk:
    needs: gatekeeper
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.9
          cache: 'pip'

      - name: Run docformatter tests
        run: ./test/presubmit-docformatter-sdk.sh
