name: KFP Manifests

on:
  push:
    branches:
      - master
      - main
      - stable
      - 'rhoai-*'
  pull_request:
    paths:
      - '.github/workflows/kubeflow-pipelines-manifests.yml'
      - 'manifests/kustomize/**'
      - '!**/*.md'
      - '!**/OWNERS'

jobs:
  gatekeeper:
    uses: ./.github/workflows/wait-for-gatekeeper.yml

  kubeflow-pipelines-manifests:
    needs: gatekeeper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run tests
        run: ./manifests/kustomize/hack/presubmit.sh
